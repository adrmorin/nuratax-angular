<div class="irs-unified-container">
  <!-- Header Copy Marker -->
  <div class="irs-copy-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 20px;">
    <span style="font-size: 1.2rem; font-weight: 950; color: #cc0000; font-family: 'Roboto Mono', monospace;">VOID <input type="checkbox" style="margin-left:5px;"></span>
    <span style="font-size: 0.65rem; font-weight: 800; text-transform: uppercase;">CORRECTED <input type="checkbox" style="margin-left:5px;"></span>
  </div>

  <div class="irs-top-grid">
    <!-- PAYER BOX -->
    <div class="irs-info-box border-b border-r" style="flex: 1.5; padding: 10px;">
      <label class="irs-box-num">PAYER'S name, address, and ZIP code</label>
      <textarea formControlName="payerName" class="irs-input-field" style="height: 60px;"></textarea>
    </div>

    <!-- TIN BOX -->
    <div class="irs-info-box border-b" style="flex: 1; padding: 10px;">
      <label class="irs-box-num">PAYER'S TIN</label>
      <input type="text" formControlName="payerTIN" class="irs-input-field">
    </div>

    <!-- YEAR BOX -->
    <div class="irs-info-box border-b" style="flex: 0.5; text-align: center; border-left: 2px solid #000;">
      <div style="font-size: 1.5rem; font-weight: 950; line-height: 1;">2024<br><span style="font-size: 1.2rem;">W-2G</span></div>
    </div>
  </div>

  <!-- WINNER Box -->
  <div class="irs-top-grid" style="border-top: none; margin-top: 0;">
    <div class="irs-info-box border-b border-r" style="flex: 1.5; padding: 10px;">
      <label class="irs-box-num">WINNER'S name, address, and ZIP code</label>
      <textarea formControlName="winnerName" class="irs-input-field" style="height: 60px;"></textarea>
    </div>
    <div class="irs-info-box border-b" style="flex: 1.5; padding: 10px;">
      <label class="irs-box-num">9 WINNER'S TIN</label>
      <input type="text" formControlName="winnerTIN" class="irs-input-field">
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="irs-form-body">
    <!-- Box 1 & 2 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">1 Reportable winnings</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box1_grossWinnings" class="irs-input-field">
        </div>
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">2 Date won</label>
        <input type="date" formControlName="box2_dateWon" class="irs-input-field">
      </div>
    </div>

    <!-- Box 3 & 4 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">3 Type of wager</label>
        <input type="text" formControlName="box3_typeOfWager" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">4 Federal income tax withheld</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box4_federalTaxWithheld" class="irs-input-field">
        </div>
      </div>
    </div>

    <!-- Box 5 & 6 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">5 Transaction</label>
        <input type="text" formControlName="box5_transaction" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">6 Race</label>
        <input type="text" formControlName="box6_race" class="irs-input-field">
      </div>
    </div>

    <!-- Box 7 & 8 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">7 Winnings from identical wagers</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box7_identicalWagers" class="irs-input-field">
        </div>
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">8 Cashier</label>
        <input type="text" formControlName="box8_cashier" class="irs-input-field">
      </div>
    </div>

    <!-- Box 10 & 11 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">10 Window</label>
        <input type="text" formControlName="box10_window" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">11 First I.D.</label>
        <input type="text" formControlName="box11_firstID" class="irs-input-field">
      </div>
    </div>

    <!-- Box 12 & 13 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">12 Second I.D.</label>
        <input type="text" formControlName="box12_secondID" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">13 State/Payer's state ID no.</label>
        <input type="text" formControlName="box13_payerStateID" class="irs-input-field">
      </div>
    </div>

    <!-- Box 14 & 15 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">14 State income tax</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box14_stateIncomeTax" class="irs-input-field">
        </div>
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">15 Local winnings</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box15_localWinnings" class="irs-input-field">
        </div>
      </div>
    </div>

    <!-- Box 16, 17, 18 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">16 Local income tax</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box16_localIncomeTax" class="irs-input-field">
        </div>
      </div>
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">17 Locality name</label>
        <input type="text" formControlName="box17_localityType" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">18 State name</label>
        <input type="text" formControlName="box18_stateName" class="irs-input-field">
      </div>
    </div>

    <div style="margin-top: 40px; text-align: left; font-size: 0.65rem; color: #555;">
      <strong>Copy B—For Winner</strong>. This information is being furnished to the Internal Revenue Service.
    </div>

    <div style="margin-top: 40px; display: flex; justify-content: flex-end;">
      <button type="submit" class="irs-btn-submit">Submit Form W-2G</button>
    </div>
  </form>
</div>
