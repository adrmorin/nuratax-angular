<div class="irs-unified-container">
    <div class="irs-w2-body">
        <form [formGroup]="formW2" (ngSubmit)="onSubmit()" *ngIf="formW2">
            <div class="irs-w2-grid">
                <!-- Left Column -->
                <div class="irs-w2-col-left">
                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>a</strong> Employee's social security number</label>
                            <label class="irs-label-es">Número de seguro social del empleado</label>
                        </div>
                        <input type="text" formControlName="boxA" class="irs-w2-input-large">
                    </div>
                    
                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>b</strong> Employer identification number (EIN)</label>
                            <label class="irs-label-es">Número de identificación del empleador (EIN)</label>
                        </div>
                        <input type="text" formControlName="boxB">
                    </div>

                    <div class="irs-cell-w2" style="height: 120px;">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>c</strong> Employer's name, address, and ZIP code</label>
                            <label class="irs-label-es">Nombre, dirección y código postal del empleador</label>
                        </div>
                        <textarea formControlName="boxCAddr" rows="3" style="font-weight: 700;"></textarea>
                    </div>

                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>d</strong> Control number</label>
                            <label class="irs-label-es">Número de control</label>
                        </div>
                        <input type="text" formControlName="boxD">
                    </div>

                    <div class="irs-cell-w2" style="height: 80px;">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>e</strong> Employee's first name / Last name</label>
                            <label class="irs-label-es">Nombre del empleado / Apellido</label>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 5px;">
                            <input type="text" formControlName="boxEFirst" placeholder="First">
                            <input type="text" formControlName="boxELast" placeholder="Last">
                        </div>
                    </div>

                    <div class="irs-cell-w2" style="height: 100px;">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>f</strong> Employee's address and ZIP code</label>
                            <label class="irs-label-es">Dirección y código postal del empleado</label>
                        </div>
                        <textarea formControlName="boxF" rows="3"></textarea>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="irs-w2-col-right">
                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>1</strong> Wages, tips, other comp.</label>
                                <label class="irs-label-es">Sueldos, propinas, etc.</label>
                            </div>
                            <input type="number" formControlName="box1" style="text-align: right; font-size: 1.2rem;">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>2</strong> AS income tax withheld</label>
                                <label class="irs-label-es">Impuesto retenido (AS)</label>
                            </div>
                            <input type="number" formControlName="box2" style="text-align: right; font-size: 1.2rem;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>3</strong> Social security wages</label>
                                <label class="irs-label-es">Salarios del seguro social</label>
                            </div>
                            <input type="number" formControlName="box3" style="text-align: right;">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>4</strong> Social security tax withheld</label>
                                <label class="irs-label-es">Impuesto del seguro social</label>
                            </div>
                            <input type="number" formControlName="box4" style="text-align: right;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>5</strong> Medicare wages and tips</label>
                                <label class="irs-label-es">Salarios y propinas de Medicare</label>
                            </div>
                            <input type="number" formControlName="box5" style="text-align: right;">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>6</strong> Medicare tax withheld</label>
                                <label class="irs-label-es">Impuesto de Medicare retenido</label>
                            </div>
                            <input type="number" formControlName="box6" style="text-align: right;">
                        </div>
                    </div>

                    <div class="irs-cell-w2" style="height: 100px;">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>12</strong> Codes and Amounts</label>
                            <label class="irs-label-es">Códigos y Cantidades</label>
                        </div>
                        <div style="display: grid; grid-template-columns: 40px 1fr; gap: 5px; margin-top: 2px;">
                            <input type="text" formControlName="box12aCode" placeholder="Cod">
                            <input type="number" formControlName="box12aAmount" style="text-align: right;">
                            <input type="text" formControlName="box12bCode" placeholder="Cod">
                            <input type="number" formControlName="box12bAmount" style="text-align: right;">
                        </div>
                    </div>

                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>13</strong> Statutory / Retirement / Sick Pay</label>
                            <label class="irs-label-es">Estatutario / Jubilación / Incapacidad</label>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 5px;">
                            <input type="checkbox" formControlName="box13Statutory">
                            <input type="checkbox" formControlName="box13Retirement">
                            <input type="checkbox" formControlName="box13SickPay">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer for W-2AS -->
            <div class="irs-w2-footer" style="display: flex; justify-content: space-between; padding: 10px; background: #eee; border-top: 2px solid #000;">
                <div>
                    <span style="font-size: 1.2rem; font-weight: 900;">Form W-2AS</span>
                    <span style="margin-left: 10px; font-weight: 700;">American Samoa Wage and Tax Statement</span>
                </div>
                <div>
                    <span style="font-size: 1.5rem; font-weight: 900;">2025</span>
                </div>
            </div>

            <div style="padding: 20px; text-align: center;">
                <button type="submit" style="background: #111; color: #fff; padding: 10px 40px; border: none; border-radius: 2px; font-weight: 900; cursor: pointer; text-transform: uppercase;">
                    Save Form W-2AS / Guardar W-2AS
                </button>
            </div>
        </form>
    </div>
</div>
