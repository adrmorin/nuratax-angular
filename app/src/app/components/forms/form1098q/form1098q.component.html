<div class="irs-unified-container">
  <!-- Header Copy Marker -->
  <div class="irs-copy-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 20px;">
    <span style="font-size: 1.2rem; font-weight: 950; color: #cc0000; font-family: 'Roboto Mono', monospace;">VOID <input type="checkbox" style="margin-left:5px;"></span>
    <span style="font-size: 0.65rem; font-weight: 800; text-transform: uppercase;">CORRECTED <input type="checkbox" style="margin-left:5px;"></span>
  </div>

  <div class="irs-top-grid">
    <!-- ISSUER BOX -->
    <div class="irs-info-box border-b border-r" style="flex: 1.5; padding: 10px;">
      <label class="irs-box-num">ISSUER'S name, address, and ZIP code</label>
      <textarea formControlName="issuerName" class="irs-input-field" style="height: 60px;"></textarea>
    </div>

    <!-- TIN BOXES -->
    <div style="flex: 1; display: flex; flex-direction: column;">
      <div class="irs-info-box border-b" style="padding: 10px;">
        <label class="irs-box-num">ISSUER'S TIN</label>
        <input type="text" formControlName="issuerTIN" class="irs-input-field">
      </div>
      <div class="irs-info-box border-b" style="padding: 10px;">
        <label class="irs-box-num">ANNUITANT'S TIN</label>
        <input type="text" formControlName="annuitantTIN" class="irs-input-field">
      </div>
    </div>

    <!-- YEAR BOX -->
    <div class="irs-info-box border-b" style="flex: 0.5; text-align: center; border-left: 2px solid #000;">
      <div style="font-size: 1.5rem; font-weight: 950; line-height: 1;">2024<br><span style="font-size: 1.2rem;">1098-Q</span></div>
    </div>
  </div>

  <div class="irs-top-grid" style="border-top: none; margin-top: 0;">
    <div class="irs-info-box border-b border-r" style="flex: 1.5; padding: 10px;">
      <label class="irs-box-num">ANNUITANT'S name, address, and ZIP code</label>
      <textarea formControlName="annuitantName" class="irs-input-field" style="height: 60px;"></textarea>
    </div>
    <div class="irs-info-box border-b" style="flex: 1.5; padding: 10px;">
      <label class="irs-box-num">Account number (see instructions)</label>
      <input type="text" formControlName="accountNum" class="irs-input-field">
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="irs-form-body">
    <!-- Box 1 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">1a Annuity amount</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box1a_annuityAmount" class="irs-input-field">
        </div>
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">1b Annuity start date</label>
        <input type="date" formControlName="box1b_dateStarts" class="irs-input-field">
      </div>
    </div>

    <!-- Box 2 & 3 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">2 Is it accelerated?</label>
        <input type="checkbox" formControlName="box2_isAccelerated">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">3 Is it an IRA/plan?</label>
        <input type="checkbox" formControlName="box3_isIRA">
      </div>
    </div>

    <!-- Box 4 & 5 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">4 FMV</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box4_fmv" class="irs-input-field">
        </div>
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">5 Total premiums</label>
        <div class="irs-currency">
          <span>$</span>
          <input type="number" formControlName="box5_totalPremiums" class="irs-input-field">
        </div>
      </div>
    </div>

    <!-- Box 6, 7, 8 -->
    <div class="irs-row-grid">
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">6 Date of Birth</label>
        <input type="date" formControlName="box6_dateOfBirth" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-r border-b">
        <label class="irs-box-num">7 Plan name</label>
        <input type="text" formControlName="box7_planName" class="irs-input-field">
      </div>
      <div class="irs-grid-box border-b">
        <label class="irs-box-num">8 Plan number</label>
        <input type="text" formControlName="box8_planNum" class="irs-input-field">
      </div>
    </div>

    <div style="margin-top: 40px; text-align: left; font-size: 0.65rem; color: #555;">
      <strong>Copy B—For Annuitant</strong>. This information is being furnished to the Internal Revenue Service.
    </div>

    <div style="margin-top: 40px; display: flex; justify-content: flex-end;">
      <button type="submit" class="irs-btn-submit">Submit Form 1098-Q</button>
    </div>
  </form>
</div>
