<div class="irs-unified-container sr-theme">
  <!-- Header -->
  <div class="irs-header-container">
    <div class="irs-id-box">
      <span class="irs-id-main" style="font-size: 3.5rem;">1040-SR</span>
      <span class="irs-id-sub" style="font-size: 1.1rem;">U.S. Tax Return for Seniors</span>
      <p style="font-size: 0.75rem; font-weight: 850; margin-top: 5px;">(Rev. 2024)</p>
    </div>
    <div class="irs-title-box">
      <p style="font-size: 0.9rem; font-weight: 700; margin-top: 10px;">Department of the Treasury—Internal Revenue Service</p>
      <h1 style="font-size: 1.6rem; font-weight: 950; text-transform: uppercase;">U.S. Individual Income Tax Return</h1>
      <p style="font-size: 1.1rem; font-weight: 950; margin-top: 20px;">Standard Deduction Chart — Page 4</p>
    </div>
    <div class="irs-omb-box">
      <span style="font-size: 0.8rem;">OMB No. 1545-0074</span>
      <div style="margin-top: 20px; font-weight: 950; font-size: 1.3rem;">2024</div>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="irs-form-body">
    <!-- FILING STATUS (Large) -->
    <div class="sr-box-row border-b" style="padding: 15px 0;">
       <label style="font-weight: 950; font-size: 1.2rem;">Filing Status:</label>
       <span style="margin-left: 20px; font-weight: 700;">Check only one box.</span>
    </div>

    <!-- Part I Identification -->
    <div class="irs-row-line-unified border-b" style="display: flex; border-bottom: 4px solid #000; padding: 15px 0;">
      <div class="irs-id-col" style="flex: 2; padding: 0 12px; border-right: 2px solid #000;">
        <label style="display: block; font-size: 0.9rem; font-weight: 950; text-transform: uppercase;">Your first name and initial</label>
        <input type="text" formControlName="firstName" class="irs-input-field-sr">
      </div>
      <div class="irs-id-col" style="flex: 1; padding: 0 12px;">
        <label style="display: block; font-size: 0.9rem; font-weight: 950; text-transform: uppercase;">Social security number</label>
        <input type="text" formControlName="ssn" class="irs-input-field-sr">
      </div>
    </div>

    <!-- AGE/BLINDNESS (LARGE CHECKBOXES) -->
    <div class="sr-age-section" style="margin-top: 30px; border: 2px solid #000; padding: 25px;">
      <h3 style="font-weight: 950; font-size: 1.3rem; margin-bottom: 20px;">Standard Deduction — Age/Blindness</h3>
      <div style="display: flex; gap: 40px; align-items: center;">
        <label class="sr-check-label">
          <input type="checkbox" formControlName="age65" class="sr-checkbox"> Were born before Jan 2, 1960
        </label>
        <label class="sr-check-label">
          <input type="checkbox" formControlName="blind" class="sr-checkbox"> Blind
        </label>
      </div>
    </div>

    <div style="margin-top: 60px; text-align: right;">
      <button type="submit" class="irs-btn-submit-sr" style="padding: 20px 60px; font-size: 1.3rem;">Submit Return</button>
    </div>
  </form>
</div>
