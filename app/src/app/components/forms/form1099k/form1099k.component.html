<div class="irs-unified-container">
    <div class="irs-w2-body">
        <form [formGroup]="form1099k" (ngSubmit)="onSubmit()" *ngIf="form1099k">
            <div class="irs-w2-grid">
                <!-- Left Column -->
                <div class="irs-w2-col-left">
                    <div class="irs-cell-w2" style="height: 140px;">
                        <textarea formControlName="filerInfo" rows="4" placeholder="FILER’S name, street address, city or town, state or province, country, ZIP or foreign postal code, and telephone no."></textarea>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en">FILER’S TIN</label>
                                <label class="irs-label-es">TIN del PAGADOR</label>
                            </div>
                            <input type="text" formControlName="filerTIN">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en">PAYEE’S TIN</label>
                                <label class="irs-label-es">TIN del BENEFICIARIO</label>
                            </div>
                            <input type="text" formControlName="payeeTIN">
                        </div>
                    </div>

                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en">PAYEE’S name</label>
                            <label class="irs-label-es">Nombre del BENEFICIARIO</label>
                        </div>
                        <input type="text" formControlName="payeeName">
                    </div>

                    <div class="irs-cell-w2" style="height: 100px;">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en">Street address (including apt. no.)</label>
                            <label class="irs-label-es">Dirección (incluyendo apto. nro.)</label>
                        </div>
                        <textarea formControlName="payeeAddress" rows="2"></textarea>
                    </div>

                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en">City, state, ZIP code</label>
                            <label class="irs-label-es">Ciudad, estado, código postal</label>
                        </div>
                        <input type="text" formControlName="payeeCityStateZip">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en">Account number</label>
                                <label class="irs-label-es">Número de cuenta</label>
                            </div>
                            <input type="text" formControlName="accountNumber">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en">Check type</label>
                                <label class="irs-label-es">Marque el tipo</label>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
                                <label style="display: flex; align-items: center; gap: 5px; font-size: 0.7rem;">
                                    <input type="radio" formControlName="paysecType" value="paymentCard"> Payment Card / Tarjeta pago
                                </label>
                                <label style="display: flex; align-items: center; gap: 5px; font-size: 0.7rem;">
                                    <input type="radio" formControlName="paysecType" value="thirdPartyNetwork"> Third Party Net / Red terceros
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="irs-w2-col-right">
                    <div style="padding: 10px; border-bottom: 2px solid #000; display: flex; justify-content: space-between;">
                        <div>
                            <div style="font-size: 1.4rem; font-weight: 800;">1099-K</div>
                            <div style="font-size: 0.7rem;">Payment Card/Third Party Network</div>
                        </div>
                        <div style="font-size: 1.8rem; font-weight: 900;">2025</div>
                    </div>

                    <div class="irs-cell-w2">
                        <div class="irs-label-wrap">
                            <label class="irs-label-en"><strong>1a</strong> Gross amount of transactions</label>
                            <label class="irs-label-es">Importe bruto de las transacciones</label>
                        </div>
                        <input type="number" formControlName="box1a" style="text-align: right; font-size: 1.2rem;">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>1b</strong> Card Not Present</label>
                                <label class="irs-label-es">Tarjeta no presente</label>
                            </div>
                            <input type="number" formControlName="box1b" style="text-align: right;">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>2</strong> Merchant category code</label>
                                <label class="irs-label-es">Código de categoría de comerciante</label>
                            </div>
                            <input type="text" formControlName="box2" style="text-align: center;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr;">
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>3</strong> Number of transactions</label>
                                <label class="irs-label-es">Número de transacciones</label>
                            </div>
                            <input type="number" formControlName="box3" style="text-align: center;">
                        </div>
                        <div class="irs-cell-w2">
                            <div class="irs-label-wrap">
                                <label class="irs-label-en"><strong>4</strong> Federal tax withheld</label>
                                <label class="irs-label-es">Impuesto federal retenido</label>
                            </div>
                            <input type="number" formControlName="box4" style="text-align: right;">
                        </div>
                    </div>

                    <!-- Monthly Section - Box 5a... -->
                    <div style="padding: 5px; border-bottom: 2px solid #000; background: #eee; font-size: 0.6rem; text-align: center; font-weight: 700;">Monthly Amounts / Cantidades Mensuales</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr);">
                         <div class="irs-cell-w2" style="padding: 2px 5px;"><strong>5a</strong> Jan <input type="number" formControlName="box5a" style="font-size: 0.8rem; height: 18px;"></div>
                         <div class="irs-cell-w2" style="padding: 2px 5px;"><strong>5b</strong> Feb <input type="number" formControlName="box5b" style="font-size: 0.8rem; height: 18px;"></div>
                         <div class="irs-cell-w2" style="padding: 2px 5px;"><strong>5c</strong> Mar <input type="number" formControlName="box5c" style="font-size: 0.8rem; height: 18px;"></div>
                         <div class="irs-cell-w2" style="padding: 2px 5px;"><strong>5d</strong> Apr <input type="number" formControlName="box5d" style="font-size: 0.8rem; height: 18px;"></div>
                    </div>
                </div>
            </div>

            <div style="padding: 20px; text-align: center;">
                <button type="submit" style="background: #111; color: #fff; padding: 10px 40px; border: none; border-radius: 2px; font-weight: 900; cursor: pointer; text-transform: uppercase;">
                    Save Form 1099-K / Guardar 1099-K
                </button>
            </div>
        </form>
    </div>
</div>
