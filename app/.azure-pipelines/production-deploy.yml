name: $(Build.SourceBranchName)-$(Date:yyyyMMdd)$(Rev:.r)
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  app_location: "dist/spacle-ng"
  output_location: "dist/spacle-ng"

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: "18.x"
    displayName: "Instalar Node.js"

  - script: |
      npm ci
      npm install -g @angular/cli
      ng build --configuration=production
    displayName: "Construir aplicación Angular para Produccion"

  - task: AzureStaticWebApp@0
    inputs:
      app_location: "$(app_location)"
      output_location: "$(output_location)"
      azure_static_web_apps_api_token: "$(AZURE_STATIC_WEB_APPS_API_TOKEN_PRODUCTION)"
      skip_app_build: true
    displayName: "Desplegar en Azure Static Web App (production)"
