<div class="irs-form">
    <div class="form-header">
        <div class="form-title"><h1>Form 8862</h1><p class="form-year">Department of the Treasury - Internal Revenue Service</p></div>
        <div class="form-info"><p><strong>Earned Income Credit</strong> - For calendar year 2026</p></div>
    </div>

    <div class="taxpayer-section">
        <div class="field-row">
            <div class="field-group"><label>Your name</label><input type="text" formControlName="name"></div>
            <div class="field-group small"><label>SSN</label><input type="text" formControlName="ssn"></div>
        </div>
    </div>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">EIC Calculation</th></tr></thead>
        <tbody>
            <tr><td class="line-num">1</td><td class="line-desc">Earned income credit claimed</td><td class="line-input"><input type="number" formControlName="eicClaimed"></td></tr>
            <tr><td class="line-num">2</td><td class="line-desc">Earned income</td><td class="line-input"><input type="number" formControlName="earnedIncome"></td></tr>
            <tr><td class="line-num">3</td><td class="line-desc">Investment income</td><td class="line-input"><input type="number" formControlName="investmentIncome"></td></tr>
            <tr class="highlight-row"><td class="line-num">4</td><td class="line-desc"><strong>EIC amount</strong></td><td class="line-input"><input type="number" formControlName="eicAmount" readonly></td></tr>
        </tbody>
    </table>

    <div class="form-actions"><button type="button" class="btn-primary" (click)="onSubmit()">Guardar</button></div>
</div>
