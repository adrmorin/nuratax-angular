<div class="irs-form">
    <div class="form-header">
        <div class="form-title"><h1>Form 2441</h1><p class="form-year">Department of the Treasury - Internal Revenue Service</p></div>
        <div class="form-info"><p><strong>Child and Dependent Care Expenses</strong> - For calendar year 2026</p></div>
    </div>

    <div class="provider-section">
        <div class="field-row">
            <div class="field-group"><label>Care provider name</label><input type="text" formControlName="providerName"></div>
            <div class="field-group small"><label>Provider TIN/EIN</label><input type="text" formControlName="providerTin"></div>
        </div>
    </div>

    <table class="form-table">
        <thead><tr><th colspan="4" class="section-header">Dependent Information</th></tr>
            <tr class="sub-header"><th>Name</th><th>SSN</th><th>Expenses</th><th>Qualified</th></tr>
        </thead>
        <tbody>
            <tr>
                <td class="line-input"><input type="text" formControlName="dependent1Name"></td>
                <td class="line-input"><input type="text" formControlName="dependent1SSN"></td>
                <td class="line-input"><input type="number" formControlName="dependent1Expenses"></td>
                <td class="line-input"><select formControlName="dependent1Qualified"><option value="Yes">Yes</option><option value="No">No</option></select></td>
            </tr>
            <tr>
                <td class="line-input"><input type="text" formControlName="dependent2Name"></td>
                <td class="line-input"><input type="text" formControlName="dependent2SSN"></td>
                <td class="line-input"><input type="number" formControlName="dependent2Expenses"></td>
                <td class="line-input"><select formControlName="dependent2Qualified"><option value="Yes">Yes</option><option value="No">No</option></select></td>
            </tr>
        </tbody>
    </table>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">Credit Calculation</th></tr></thead>
        <tbody>
            <tr class="highlight-row"><td class="line-num">10</td><td class="line-desc"><strong>Total expenses</strong></td><td class="line-input"><input type="number" formControlName="totalExpenses" readonly></td></tr>
            <tr><td class="line-num">11</td><td class="line-desc">Credit percentage</td><td class="line-input"><input type="number" formControlName="creditPercentage"></td></tr>
            <tr class="highlight-row"><td class="line-num">12</td><td class="line-desc"><strong>Maximum credit</strong></td><td class="line-input"><input type="number" formControlName="maxCredit" readonly></td></tr>
            <tr><td class="line-num">13</td><td class="line-desc">Earned income</td><td class="line-input"><input type="number" formControlName="earnedIncome"></td></tr>
            <tr class="highlight-row"><td class="line-num">14</td><td class="line-desc"><strong>Credit amount</strong></td><td class="line-input"><input type="number" formControlName="creditAmount" readonly></td></tr>
        </tbody>
    </table>

    <div class="form-actions"><button type="button" class="btn-primary" (click)="onSubmit()">Guardar</button></div>
</div>
