<div class="irs-form">
    <div class="form-header">
        <div class="form-title"><h1>Form 8915</h1><p class="form-year">Department of the Treasury - Internal Revenue Service</p></div>
        <div class="form-info"><p><strong>Qualified Disaster Loss</strong> - For calendar year 2026</p></div>
    </div>

    <div class="taxpayer-section">
        <div class="field-row">
            <div class="field-group"><label>Name</label><input type="text" formControlName="name"></div>
            <div class="field-group small"><label>SSN</label><input type="text" formControlName="ssn"></div>
        </div>
    </div>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">Disaster Information</th></tr></thead>
        <tbody>
            <tr><td class="line-num">1</td><td class="line-desc">Year of disaster loss</td><td class="line-input"><input type="number" formControlName="yearOfLoss"></td></tr>
            <tr><td class="line-num">2</td><td class="line-desc">Type of disaster</td><td class="line-input"><input type="text" formControlName="disasterType"></td></tr>
        </tbody>
    </table>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">Loss Calculation</th></tr></thead>
        <tbody>
            <tr><td class="line-num">3</td><td class="line-desc">Total qualified disaster loss</td><td class="line-input"><input type="number" formControlName="totalLoss"></td></tr>
            <tr><td class="line-num">4</td><td class="line-desc">Amount previously used</td><td class="line-input"><input type="number" formControlName="amountPreviouslyUsed"></td></tr>
            <tr><td class="line-num">5</td><td class="line-desc">Amount this year</td><td class="line-input"><input type="number" formControlName="amountThisYear"></td></tr>
            <tr class="highlight-row"><td class="line-num">6</td><td class="line-desc"><strong>Remaining amount</strong></td><td class="line-input"><input type="number" formControlName="remainingAmount" readonly></td></tr>
        </tbody>
    </table>

    <div class="form-actions"><button type="button" class="btn-primary" (click)="onSubmit()">Guardar</button></div>
</div>
