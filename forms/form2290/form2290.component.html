<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 2290 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">2290</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Heavy Vehicle Use Tax</h1><p class="irs-instruction">▶ Attach to Form 1040 or 1040-SR.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">29</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Nombre</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="vin">VIN</label><input id="vin" type="text" formControlName="vin"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">Vehicle Information</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="taxableWeight">Taxable gross weight (lbs) . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="taxableWeight" type="number" formControlName="taxableWeight"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="monthFirstUsed">Month first used . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="monthFirstUsed" type="number" formControlName="monthFirstUsed"></td></tr>
                    <tr><td class="irs-line-num">3</td><td class="irs-desc"><label for="taxDue">Tax due . . . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">3</td><td class="irs-val-cell"><input id="taxDue" type="number" formControlName="taxDue"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 2290</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
