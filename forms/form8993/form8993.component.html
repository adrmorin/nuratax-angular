<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 8993 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">8993</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Depreciation Recapture</h1><p class="irs-instruction">▶ Attach to Form 1040 or 1065.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">93</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border"><div class="irs-field flex-2 border-right"><label>Nombre</label><input type="text" formControlName="name"></div><div class="irs-field flex-1"><label>SSN</label><input type="text" formControlName="ssn"></div></div>
            <table class="irs-table">
                <tbody>
                    <tr><td>1</td><td><label>Total depreciation taken</label></td><td>1</td><td><input type="number" formControlName="depreciation"></td></tr>
                    <tr><td>2</td><td><label>Depreciation allowed</label></td><td>2</td><td><input type="number" formControlName="allowed"></td></tr>
                    <tr><td>3</td><td><label>Recapture amount</label></td><td>3</td><td><input type="number" formControlName="recapture"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
