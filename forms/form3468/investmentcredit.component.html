<div class="irs-form">
    <div class="form-header">
        <div class="form-title"><h1>Form 3468</h1><p class="form-year">Department of the Treasury - Internal Revenue Service</p></div>
        <div class="form-info"><p><strong>Investment Credit</strong> - Attach to your tax return.</p></div>
    </div>

    <div class="applicant-section">
        <div class="field-row">
            <div class="field-group"><label>Applicant name</label><input type="text" formControlName="applicantName"></div>
            <div class="field-group small"><label>EIN</label><input type="text" formControlName="ein"></div>
        </div>
        <div class="field-row">
            <div class="field-group"><label>Project name</label><input type="text" formControlName="projectName"></div>
            <div class="field-group"><label>Project location</label><input type="text" formControlName="projectLocation"></div>
        </div>
    </div>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">Credit Calculation</th></tr></thead>
        <tbody>
            <tr><td class="line-num">1</td><td class="line-desc">Qualified investment</td><td class="line-input"><input type="number" formControlName="qualifiedInvestment"></td></tr>
            <tr><td class="line-num">2</td><td class="line-desc">Credit percentage</td><td class="line-input"><input type="number" formControlName="creditPercentage"></td></tr>
            <tr class="highlight-row"><td class="line-num">3</td><td class="line-desc"><strong>Credit amount</strong></td><td class="line-input"><input type="number" formControlName="creditAmount" readonly></td></tr>
        </tbody>
    </table>

    <div class="form-actions"><button type="button" class="btn-primary" (click)="onSubmit()">Guardar</button></div>
</div>
