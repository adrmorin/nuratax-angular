<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 8990 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">8990</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Limitation on Business Losses</h1><p class="irs-instruction">▶ Attach to Form 1040 or 1040-SR.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">89</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Nombre</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="ssn">SSN</label><input id="ssn" type="text" formControlName="ssn"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">Loss Limitation</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="totalLoss">Total business losses . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="totalLoss" type="number" formControlName="totalLoss"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="threshold">Income threshold . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="threshold" type="number" formControlName="threshold"></td></tr>
                    <tr class="irs-result-row"><td class="irs-line-num">3</td><td class="irs-desc"><strong>Allowed loss . . . . . . . . . . . . . . . . . . . . . . . .</strong></td><td class="irs-line-num">3</td><td class="irs-val-cell calculated">{{ taxForm.get('allowedLoss')?.value | currency }}</td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 8990</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
