<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 1040-SS 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">1040-SS</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>U.S. Self-Employment Tax Return</h1><p class="irs-instruction">▶ For self-employed persons.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">04</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Nombre</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="ssn">SSN</label><input id="ssn" type="text" formControlName="ssn"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">Net Earnings</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="netEarnings">Net earnings from self-employment . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="netEarnings" type="number" formControlName="netEarnings"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="seTaxRate">SE tax rate (%) . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="seTaxRate" type="number" formControlName="seTaxRate"></td></tr>
                    <tr class="irs-result-row"><td class="irs-line-num">3</td><td class="irs-desc"><strong>SE tax . . . . . . . . . . . . . . . . . . . . . . . . . . .</strong></td><td class="irs-line-num">3</td><td class="irs-val-cell calculated">{{ taxForm.get('seTax')?.value | currency }}</td></tr>
                </tbody>
            </table>
            <div class="irs-section-header"><span class="irs-part-num">Part II</span><span class="irs-part-title">Deductions</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">4</td><td class="irs-desc"><label for="deductSE">Deductible SE tax . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">4</td><td class="irs-val-cell"><input id="deductSE" type="number" formControlName="deductSE"></td></tr>
                    <tr><td class="irs-line-num">5</td><td class="irs-desc"><label for="halfSE">Half of SE tax . . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">5</td><td class="irs-val-cell"><input id="halfSE" type="number" formControlName="halfSE"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 1040-SS</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
