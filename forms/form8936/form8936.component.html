<div class="irs-form">
    <div class="form-header">
        <div class="form-title"><h1>Form 8936</h1><p class="form-year">Department of the Treasury - Internal Revenue Service</p></div>
        <div class="form-info"><p><strong>Clean Vehicle Credit</strong> - For calendar year 2026</p></div>
    </div>

    <div class="vehicle-section">
        <div class="field-row">
            <div class="field-group"><label>Vehicle make</label><input type="text" formControlName="vehicleMake"></div>
            <div class="field-group"><label>Vehicle model</label><input type="text" formControlName="vehicleModel"></div>
            <div class="field-group small"><label>Year</label><input type="number" formControlName="vehicleYear"></div>
        </div>
        <div class="field-row">
            <div class="field-group"><label>Vehicle identification number (VIN)</label><input type="text" formControlName="vin"></div>
        </div>
    </div>

    <div class="purchase-section">
        <div class="field-row">
            <div class="field-group"><label>Purchase date</label><input type="date" formControlName="purchaseDate"></div>
            <div class="field-group"><label>Purchase price</label><input type="number" formControlName="purchasePrice"></div>
            <div class="field-group"><label>Business use %</label><input type="number" formControlName="businessUsePercent"></div>
        </div>
    </div>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">Credit Calculation</th></tr></thead>
        <tbody>
            <tr><td class="line-num">1</td><td class="line-desc">Clean vehicle credit amount</td><td class="line-input"><input type="number" formControlName="creditAmount" readonly></td></tr>
            <tr><td class="line-num">2</td><td class="line-desc">Personal use credit</td><td class="line-input"><input type="number" formControlName="personalUseCredit" readonly></td></tr>
            <tr><td class="line-num">3</td><td class="line-desc">Business use credit</td><td class="line-input"><input type="number" formControlName="businessCredit"></td></tr>
            <tr class="highlight-row"><td class="line-num">4</td><td class="line-desc"><strong>Total credit</strong></td><td class="line-input"><input type="number" formControlName="totalCredit" readonly></td></tr>
        </tbody>
    </table>

    <div class="form-actions"><button type="button" class="btn-primary" (click)="onSubmit()">Guardar</button></div>
</div>
