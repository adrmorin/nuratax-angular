<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 6198 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">6198</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>At-Risk Limitations</h1><p class="irs-instruction">▶ Attach to Form 1040 or 1040-NR.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">71</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Nombre</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="ssn">SSN</label><input id="ssn" type="text" formControlName="ssn"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">Current Year Investment</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="totalInvestment">Total investment at risk . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="totalInvestment" type="number" formControlName="totalInvestment"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="lossDeduction">Losses deducted in prior years . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="lossDeduction" type="number" formControlName="lossDeduction"></td></tr>
                    <tr><td class="irs-line-num">3</td><td class="irs-desc"><label for="currentLoss">Current year loss . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">3</td><td class="irs-val-cell"><input id="currentLoss" type="number" formControlName="currentLoss"></td></tr>
                    <tr class="irs-result-row"><td class="irs-line-num">4</td><td class="irs-desc"><strong>Total loss available . . . . . . . . . . . . . . . . . . . . .</strong></td><td class="irs-line-num">4</td><td class="irs-val-cell calculated">{{ taxForm.get('totalAvailable')?.value | currency }}</td></tr>
                </tbody>
            </table>
            <div class="irs-section-header"><span class="irs-part-num">Part II</span><span class="irs-part-title">At-Risk Limitation</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">5</td><td class="irs-desc"><label for="amountAtRisk">Amount at risk . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">5</td><td class="irs-val-cell"><input id="amountAtRisk" type="number" formControlName="amountAtRisk"></td></tr>
                    <tr><td class="irs-line-num">6</td><td class="irs-desc"><label for="deductionLimited">Deduction limited to at-risk amount . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">6</td><td class="irs-val-cell"><input id="deductionLimited" type="number" formControlName="deductionLimited"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 6198</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
