<div class="irs-form">
    <div class="form-header">
        <div class="form-title"><h1>Form 2210</h1><p class="form-year">Department of the Treasury - Internal Revenue Service</p></div>
        <div class="form-info"><p><strong>Underpayment of Estimated Tax by Individuals</strong> - For calendar year 2026</p></div>
    </div>

    <div class="taxpayer-section">
        <div class="field-row">
            <div class="field-group"><label>Your name</label><input type="text" formControlName="name"></div>
            <div class="field-group small"><label>SSN</label><input type="text" formControlName="ssn"></div>
            <div class="field-group"><label>Filing status</label><select formControlName="filingStatus"><option value="single">Single</option><option value="married">Married</option></select></div>
        </div>
    </div>

    <table class="form-table">
        <thead><tr><th colspan="3" class="section-header">Tax Calculation</th></tr></thead>
        <tbody>
            <tr><td class="line-num">10</td><td class="line-desc">Total tax</td><td class="line-input"><input type="number" formControlName="totalTax"></td></tr>
            <tr><td class="line-num">11</td><td class="line-desc">Income tax withheld</td><td class="line-input"><input type="number" formControlName="withholding"></td></tr>
            <tr><td class="line-num">12</td><td class="line-desc">Required payment</td><td class="line-input"><input type="number" formControlName="requiredPayment"></td></tr>
            <tr class="highlight-row"><td class="line-num">13</td><td class="line-desc"><strong>Underpayment</strong></td><td class="line-input"><input type="number" formControlName="underpayment" readonly></td></tr>
            <tr class="highlight-row"><td class="line-num">18</td><td class="line-desc"><strong>Penalty</strong></td><td class="line-input"><input type="number" formControlName="penalty" readonly></td></tr>
        </tbody>
    </table>

    <div class="form-actions"><button type="button" class="btn-primary" (click)="onSubmit()">Guardar</button></div>
</div>
