<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 8992 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">8992</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Base Erosion and Anti-Abuse Tax</h1><p class="irs-instruction">▶ Attach to Form 1120.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">92</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Corporation Name</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="ein">EIN</label><input id="ein" type="text" formControlName="ein"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">BEAT Calculation</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="modifiedTaxable">Modified taxable income . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="modifiedTaxable" type="number" formControlName="modifiedTaxable"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="baseErosion">Base erosion payments . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="baseErosion" type="number" formControlName="baseErosion"></td></tr>
                    <tr><td class="irs-line-num">3</td><td class="irs-desc"><label for="taxRate">BEAT rate (%) . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">3</td><td class="irs-val-cell"><input id="taxRate" type="number" formControlName="taxRate"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 8992</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
