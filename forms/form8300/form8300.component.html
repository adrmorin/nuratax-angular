<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 8300 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">8300</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Report of Cash Payments Over $10,000</h1><p class="irs-instruction">▶ File with IRS.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">83</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Payer's Name</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="tin">TIN</label><input id="tin" type="text" formControlName="tin"></div>
            </div>
            <div class="irs-row-border">
                <div class="irs-field flex-1 border-right"><label for="address">Address</label><input id="address" type="text" formControlName="address"></div>
                <div class="irs-field flex-1"><label for="cityStateZip">City, State, ZIP</label><input id="cityStateZip" type="text" formControlName="cityStateZip"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">Cash Received</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="cashAmount">Total cash received . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="cashAmount" type="number" formControlName="cashAmount"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="dateReceived">Date of payment . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="dateReceived" type="date" formControlName="dateReceived"></td></tr>
                    <tr><td class="irs-line-num">3</td><td class="irs-desc"><label for="description">Description . . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">3</td><td class="irs-val-cell"><input id="description" type="text" formControlName="description"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 8300</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
