<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 1099-B 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">1099-B</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Proceeds From Broker and Barter Exchange Transactions</h1><p class="irs-instruction">▶ File with recipient and IRS.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Box</span><span class="irs-sequence-num">12</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="payerName">Broker Name</label><input id="payerName" type="text" formControlName="payerName"></div>
                <div class="irs-field flex-1"><label for="tin">TIN</label><input id="tin" type="text" formControlName="tin"></div>
            </div>
            <div class="irs-row-border">
                <div class="irs-field flex-1 border-right"><label for="recipientName">Recipient Name</label><input id="recipientName" type="text" formControlName="recipientName"></div>
                <div class="irs-field flex-1"><label for="recipientTIN">Recipient TIN</label><input id="recipientTIN" type="text" formControlName="recipientTIN"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Box 1</span><span class="irs-part-title">Proceeds</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="proceeds">Gross proceeds . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="proceeds" type="number" formControlName="proceeds"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="costBasis">Cost or other basis . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="costBasis" type="number" formControlName="costBasis"></td></tr>
                    <tr class="irs-result-row"><td class="irs-line-num">3</td><td class="irs-desc"><strong>Gain or (loss) . . . . . . . . . . . . . . . . . . . . . . .</strong></td><td class="irs-line-num">3</td><td class="irs-val-cell calculated">{{ taxForm.get('gainLoss')?.value | currency }}</td></tr>
                    <tr><td class="irs-line-num">4</td><td class="irs-desc"><label for="federalWithheld">Federal income tax withheld . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">4</td><td class="irs-val-cell"><input id="federalWithheld" type="number" formControlName="federalWithheld"></td></tr>
                    <tr><td class="irs-line-num">5</td><td class="irs-desc"><label for="description">Description of property . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">5</td><td class="irs-val-cell"><input id="description" type="text" formControlName="description"></td></tr>
                    <tr><td class="irs-line-num">6</td><td class="irs-desc"><label for="dateAcquired">Date acquired . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">6</td><td class="irs-val-cell"><input id="dateAcquired" type="date" formControlName="dateAcquired"></td></tr>
                    <tr><td class="irs-line-num">7</td><td class="irs-desc"><label for="dateSold">Date sold . . . . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">7</td><td class="irs-val-cell"><input id="dateSold" type="date" formControlName="dateSold"></td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 1099-B</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
