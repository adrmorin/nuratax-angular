<div class="irs-form-container">
    <div class="irs-header"><div class="form-title">Formulario 8824 2026</div></div>
    <div class="irs-form-box">
        <div class="irs-main-header">
            <div class="irs-col-1"><span class="irs-form-id">8824</span><span class="irs-form-sub-id">2026</span></div>
            <div class="irs-col-2"><h1>Like-Kind Exchanges</h1><p class="irs-instruction">▶ Attach to Form 1040 or 1040-SR.</p></div>
            <div class="irs-col-3"><div class="irs-sequence-box"><span>Secuencia</span><span class="irs-sequence-num">84</span></div></div>
        </div>
        <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
            <div class="irs-row-border">
                <div class="irs-field flex-2 border-right"><label for="name">Nombre</label><input id="name" type="text" formControlName="name"></div>
                <div class="irs-field flex-1"><label for="ssn">SSN</label><input id="ssn" type="text" formControlName="ssn"></div>
            </div>
            <div class="irs-section-header"><span class="irs-part-num">Part I</span><span class="irs-part-title">Exchange Information</span></div>
            <table class="irs-table">
                <tbody>
                    <tr><td class="irs-line-num">1</td><td class="irs-desc"><label for="description">Description of property given . . . . . . . . . . . . . .</label></td><td class="irs-line-num">1</td><td class="irs-val-cell"><input id="description" type="text" formControlName="description"></td></tr>
                    <tr><td class="irs-line-num">2</td><td class="irs-desc"><label for="dateExchanged">Date of exchange . . . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">2</td><td class="irs-val-cell"><input id="dateExchanged" type="date" formControlName="dateExchanged"></td></tr>
                    <tr><td class="irs-line-num">3</td><td class="irs-desc"><label for="fmvGiven">FMV of property given . . . . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">3</td><td class="irs-val-cell"><input id="fmvGiven" type="number" formControlName="fmvGiven"></td></tr>
                    <tr><td class="irs-line-num">4</td><td class="irs-desc"><label for="fmvReceived">FMV of property received . . . . . . . . . . . . . . . .</label></td><td class="irs-line-num">4</td><td class="irs-val-cell"><input id="fmvReceived" type="number" formControlName="fmvReceived"></td></tr>
                    <tr class="irs-result-row"><td class="irs-line-num">5</td><td class="irs-desc"><strong>Gain recognized . . . . . . . . . . . . . . . . . . . . .</strong></td><td class="irs-line-num">5</td><td class="irs-val-cell calculated">{{ taxForm.get('gainRecognized')?.value | currency }}</td></tr>
                </tbody>
            </table>
            <div class="irs-footer-actions"><button type="submit" class="btn-irs-submit">Guardar Formulario 8824</button></div>
        </form>
        <app-chatforms></app-chatforms>
    </div>
</div>
